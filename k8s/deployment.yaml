apiVersion: apps/v1
kind: Deployment
metadata:
  name: unsloth-optimiser-api
  labels:
    app: unsloth-optimiser-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: unsloth-optimiser-api
  template:
    metadata:
      labels:
        app: unsloth-optimiser-api
    spec:
      containers:
        - name: api
          image: unsloth-optimiser:latest
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unsloth-optimiser-worker
  labels:
    app: unsloth-optimiser-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: unsloth-optimiser-worker
  template:
    metadata:
      labels:
        app: unsloth-optimiser-worker
    spec:
      containers:
        - name: worker
          image: unsloth-optimiser:latest
          command: ["celery", "-A", "src.api.tasks.celery", "worker", "--loglevel=info"]
          env:
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database-url
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
