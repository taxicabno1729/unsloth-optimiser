apiVersion: v1
kind: Service
metadata:
  name: unsloth-optimiser
  labels:
    app: unsloth-optimiser
spec:
  selector:
    app: unsloth-optimiser-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
